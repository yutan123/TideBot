<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TideBot Console</title>
    <!-- 使用现代无衬线字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 移动端顶部导航 (桌面端隐藏) -->
        <header id="mobile-header">
            <button id="menu-toggle" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <span class="mobile-title">TideBot</span>
        </header>

        <!-- 侧边栏 -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h2>TideBot</h2>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-view="console" class="active">核心配置</a></li>
                <li><a href="#" data-view="chat">对话测试</a></li>
                <li><a href="#" data-view="connect">终端连接</a></li>
            </ul>
        </nav>

        <!-- 主内容容器 -->
        <main id="main-content">
            <div id="view-container">
                <!-- JS 会将各个 View 渲染到这里 -->
            </div>
        </main>
    </div>

    <!-- ES6 模块入口 -->
    <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
